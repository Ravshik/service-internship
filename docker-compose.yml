services:
  service-internship-booking:
    build: .
    container_name: service-internship-booking
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    volumes:
      - ./data:/app/data
